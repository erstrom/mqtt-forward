services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-forward-mosquitto
    restart: unless-stopped
    user: ${UID_GID}
    volumes:
      - ${MOSQUITTO_CONF}:/mosquitto/config/mosquitto.conf
      - ./mosquitto-certs:/mosquitto-certs
    ports:
      - "${MOSQUITTO_PORT}:${MOSQUITTO_PORT}"
